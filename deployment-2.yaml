apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-app-2
  labels:
    app: fastapi-app-2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi-app-2
  template:
    metadata:
      labels:
        app: fastapi-app-2
    spec:
      containers:
        - name: fastapi-app-2
          image: thangaakilan/fastapi-app:6c290a63a27e1b556b8e7c5a6d0ef90c503e87c5
          env:
          - name: SERVICE_NAME
            value: "fastapi-app-2"
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"